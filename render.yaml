# Blueprint de Render — versión MÍNIMA y robusta (carpeta simple/).
# Sin base de datos, sin compilación: solo Express + fetch. Arranca en segundos.
services:
  - type: web
    name: campaign-system
    runtime: node
    plan: free
    rootDir: simple
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
